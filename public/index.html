<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIGNAL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#0d0d0d; --surface:#111113; --surface2:#161618; --surface3:#1c1c1f;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.12);
  --text:#f0f0f2; --text2:#a0a0b0; --text3:#606070;
  --green:#3ecf8e; --red:#f87171; --amber:#f59e0b; --blue:#60a5fa; --purple:#a78bfa;
  --mono:'JetBrains Mono',monospace; --sans:'Inter',sans-serif; --r:6px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;overflow:hidden;-webkit-font-smoothing:antialiased;}

/* LAYOUT */
.app{display:grid;grid-template-rows:44px 1fr;grid-template-columns:220px 1fr 320px;height:100vh;}

/* TOPBAR */
.topbar{grid-column:1/-1;display:flex;align-items:center;background:var(--surface);border-bottom:1px solid var(--border);padding:0 14px;gap:0;}
.logo{font-family:var(--mono);font-size:12px;font-weight:500;letter-spacing:.08em;color:var(--text);padding-right:14px;border-right:1px solid var(--border);margin-right:14px;white-space:nowrap;}
.logo em{color:var(--text3);font-style:normal;}
.ticker-wrap{flex:1;overflow:hidden;height:100%;display:flex;align-items:center;mask-image:linear-gradient(to right,transparent,black 40px,black calc(100% - 40px),transparent);}
.ticker-track{display:flex;gap:0;white-space:nowrap;animation:ticker 80s linear infinite;}
.ticker-track:hover{animation-play-state:paused;}
@keyframes ticker{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}
.t-item{display:flex;align-items:center;gap:7px;padding:0 14px;height:44px;cursor:pointer;border-right:1px solid var(--border);transition:background .1s;}
.t-item:hover{background:var(--surface2);}
.t-sym{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--text2);}
.t-val{font-family:var(--mono);font-size:11px;color:var(--text);}
.t-chg{font-family:var(--mono);font-size:10px;}
.t-chg.up{color:var(--green);} .t-chg.dn{color:var(--red);}
.topbar-right{display:flex;align-items:center;gap:10px;padding-left:14px;border-left:1px solid var(--border);flex-shrink:0;}
.status-dot{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 3s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}
.status-txt{font-family:var(--mono);font-size:10px;color:var(--text3);}

/* AUTH BUTTON */
.auth-btn{font-family:var(--mono);font-size:10px;padding:4px 10px;border-radius:4px;border:1px solid var(--border2);background:none;color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap;}
.auth-btn:hover{background:var(--surface3);color:var(--text);}
.auth-btn.signed-in{color:var(--green);border-color:rgba(62,207,142,.3);}
.user-label{font-family:var(--mono);font-size:10px;color:var(--text3);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* SIDEBAR */
.sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sidebar-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.stab{flex:1;padding:8px 0;font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);background:none;border:none;cursor:pointer;transition:all .15s;border-bottom:2px solid transparent;}
.stab:hover{color:var(--text2);}
.stab.active{color:var(--text);border-bottom-color:var(--text);}
.sidebar-body{flex:1;overflow-y:auto;overflow-x:hidden;}
.sidebar-body::-webkit-scrollbar{width:0;}
.asset-group{padding:12px 0 4px;}
.group-label{font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);padding:0 12px 6px;}
.asset-row{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;cursor:pointer;transition:background .1s;border-left:2px solid transparent;gap:8px;}
.asset-row:hover{background:var(--surface2);}
.asset-row.active{background:var(--surface3);border-left-color:var(--text);}
.ar-left{display:flex;flex-direction:column;gap:1px;min-width:0;}
.ar-sym{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--text2);}
.ar-name{font-size:10px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ar-right{text-align:right;flex-shrink:0;}
.ar-price{font-family:var(--mono);font-size:11px;color:var(--text);}
.ar-chg{font-family:var(--mono);font-size:10px;}
.ar-chg.up{color:var(--green);} .ar-chg.dn{color:var(--red);} .ar-chg.flat{color:var(--text3);}
.sidebar-divider{height:1px;background:var(--border);margin:2px 0;}
[data-type="commodity"] .ar-sym{color:var(--amber);}
[data-type="crypto"] .ar-sym{color:var(--blue);}
[data-type="eu-equity"] .ar-sym{color:var(--purple);}

/* WATCHLIST EMPTY STATE */
.watchlist-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;gap:8px;color:var(--text3);font-size:12px;text-align:center;padding:0 20px;}
.watchlist-empty button{margin-top:8px;font-family:var(--mono);font-size:10px;padding:5px 12px;border:1px solid var(--border2);background:none;color:var(--text2);cursor:pointer;border-radius:4px;}
.watchlist-empty button:hover{background:var(--surface3);}

/* WATCHLIST TOGGLE */
.watch-toggle{width:16px;height:16px;display:flex;align-items:center;justify-content:center;border-radius:3px;border:1px solid var(--border);background:none;cursor:pointer;flex-shrink:0;transition:all .15s;color:var(--text3);font-size:11px;}
.watch-toggle:hover{border-color:var(--amber);color:var(--amber);}
.watch-toggle.watched{border-color:var(--amber);color:var(--amber);background:rgba(245,158,11,.1);}

/* CHART AREA */
.chart-area{background:var(--bg);display:flex;flex-direction:column;border-right:1px solid var(--border);overflow:hidden;}
.chart-header{display:flex;align-items:center;padding:10px 16px;gap:16px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;}
.ch-sym{font-family:var(--mono);font-size:18px;font-weight:500;color:var(--text);}
.ch-name{font-size:11px;color:var(--text3);margin-top:1px;}
.ch-badge{font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:3px;border:1px solid var(--border2);color:var(--text3);}
.ch-price-block{margin-left:auto;text-align:right;}
.ch-price{font-family:var(--mono);font-size:20px;font-weight:400;color:var(--text);}
.ch-chg{font-family:var(--mono);font-size:11px;margin-top:2px;}
.ch-chg.up{color:var(--green);} .ch-chg.dn{color:var(--red);}
.chart-frame{flex:1;overflow:hidden;}
.chart-frame iframe{width:100%;height:100%;border:none;display:block;}

/* NEWS PANEL */
.news-panel{background:var(--surface);display:flex;flex-direction:column;overflow:hidden;}
.np-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0;}
.np-title{font-size:11px;font-weight:500;color:var(--text2);letter-spacing:.04em;}
.np-count{font-family:var(--mono);font-size:10px;color:var(--text3);background:var(--surface3);padding:1px 6px;border-radius:3px;}

/* AI CARD */
.ai-card{margin:10px 12px 0;border:1px solid var(--border);border-radius:var(--r);background:var(--surface2);flex-shrink:0;overflow:hidden;}
.ai-card-header{display:flex;align-items:center;justify-content:space-between;padding:7px 11px;border-bottom:1px solid var(--border);}
.ai-label{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:.06em;}
.ai-right{display:flex;align-items:center;gap:6px;}
.ai-catalyst{font-family:var(--mono);font-size:9px;color:var(--text3);background:var(--surface3);padding:1px 6px;border-radius:3px;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ai-badge{font-family:var(--mono);font-size:10px;font-weight:500;padding:1px 6px;border-radius:3px;}
.ai-badge.bullish{color:var(--green);background:rgba(62,207,142,.1);}
.ai-badge.bearish{color:var(--red);background:rgba(248,113,113,.1);}
.ai-badge.neutral{color:var(--amber);background:rgba(245,158,11,.1);}
.ai-badge.loading{color:var(--text3);background:var(--surface3);}
.ai-body{padding:10px 11px;font-size:11.5px;line-height:1.7;color:var(--text2);max-height:100px;overflow-y:auto;}
.ai-body::-webkit-scrollbar{width:0;}

/* DOTS */
.dots{display:inline-flex;gap:3px;}
.dots span{width:3px;height:3px;border-radius:50%;background:var(--text3);animation:dotpulse 1.2s infinite;}
.dots span:nth-child(2){animation-delay:.2s;} .dots span:nth-child(3){animation-delay:.4s;}
@keyframes dotpulse{0%,80%,100%{opacity:.2;}40%{opacity:1;}}

/* NEWS FEED */
.news-search-wrap{padding:8px 12px;border-bottom:1px solid var(--border);flex-shrink:0;}
.news-search{width:100%;background:var(--surface3);border:1px solid var(--border);border-radius:4px;padding:5px 10px;color:var(--text);font-family:var(--sans);font-size:11px;outline:none;transition:border-color .15s;}
.news-search:focus{border-color:var(--border2);}
.news-search::placeholder{color:var(--text3);}
.news-feed{flex:1;overflow-y:auto;}
.news-feed::-webkit-scrollbar{width:3px;}
.news-feed::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.news-item{padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;}
.news-item:hover{background:var(--surface2);}
.news-item:hover .ni-summary{display:block;}
.ni-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.ni-source{font-size:10px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.05em;}
.ni-age{font-family:var(--mono);font-size:10px;color:var(--text3);}
.ni-headline{font-size:12px;line-height:1.55;color:var(--text);}
.ni-summary{display:none;font-size:11px;color:var(--text2);line-height:1.6;margin-top:5px;}
.empty-feed{display:flex;flex-direction:column;align-items:center;justify-content:center;height:160px;gap:8px;color:var(--text3);font-size:12px;}

/* AUTH MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px);}
.modal-overlay.hidden{display:none;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:10px;width:360px;overflow:hidden;}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--text);}
.modal-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;line-height:1;}
.modal-close:hover{color:var(--text);}
.modal-body{padding:20px;}
.modal-tabs{display:flex;gap:0;margin-bottom:20px;border:1px solid var(--border);border-radius:5px;overflow:hidden;}
.mtab{flex:1;padding:7px;font-family:var(--mono);font-size:11px;background:none;border:none;color:var(--text3);cursor:pointer;transition:all .15s;}
.mtab.active{background:var(--surface3);color:var(--text);}
.form-group{margin-bottom:14px;}
.form-label{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px;display:block;}
.form-input{width:100%;background:var(--surface3);border:1px solid var(--border);border-radius:4px;padding:8px 11px;color:var(--text);font-family:var(--sans);font-size:12px;outline:none;transition:border-color .15s;}
.form-input:focus{border-color:var(--border2);}
.form-input::placeholder{color:var(--text3);}
.form-btn{width:100%;padding:9px;background:var(--text);color:var(--bg);border:none;border-radius:4px;font-family:var(--mono);font-size:11px;font-weight:500;cursor:pointer;transition:opacity .15s;margin-top:4px;}
.form-btn:hover{opacity:.85;}
.form-btn:disabled{opacity:.4;cursor:default;}
.form-msg{font-size:11px;margin-top:10px;text-align:center;}
.form-msg.err{color:var(--red);} .form-msg.ok{color:var(--green);}
.divider-line{height:1px;background:var(--border);margin:16px 0;}

</style>
</head>
<body>
<div class="app">

<!-- TOPBAR -->
<header class="topbar">
  <div class="logo">SIGNAL <em>/ markets</em></div>
  <div class="ticker-wrap"><div class="ticker-track" id="tickerTrack"></div></div>
  <div class="topbar-right">
    <div class="status-dot"></div>
    <span class="status-txt">LIVE</span>
    <span class="user-label" id="userLabel" style="display:none"></span>
    <button class="auth-btn" id="authBtn" onclick="openAuth()">Sign in</button>
  </div>
</header>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-tabs">
    <button class="stab active" onclick="switchTab('all',this)">All</button>
    <button class="stab" onclick="switchTab('watchlist',this)">Watchlist</button>
  </div>
  <div class="sidebar-body" id="sidebarBody">
    <!-- populated by JS -->
  </div>
</aside>

<!-- CHART -->
<main class="chart-area">
  <div class="chart-header">
    <div>
      <div class="ch-sym" id="hSym">—</div>
      <div class="ch-name" id="hName">Select an asset</div>
    </div>
    <span class="ch-badge" id="hType">—</span>
    <div class="ch-price-block">
      <div class="ch-price" id="hPrice">—</div>
      <div class="ch-chg" id="hChg">—</div>
    </div>
  </div>
  <div class="chart-frame">
    <iframe id="tvChart" src="" title="TradingView Chart" allowtransparency="true"></iframe>
  </div>
</main>

<!-- NEWS PANEL -->
<aside class="news-panel">
  <div class="np-header">
    <span class="np-title" id="npTitle">News</span>
    <span class="np-count" id="npCount">—</span>
  </div>
  <div class="ai-card" style="opacity:.4;pointer-events:none;">
    <div class="ai-card-header">
      <span class="ai-label">MACRO CONTEXT</span>
      <span class="ai-badge loading" id="aiBadge">COMING SOON</span>
    </div>
    <div class="ai-body" id="aiBody"><span style="color:var(--text3)">AI macro analysis — available in a future update.</span></div>
  </div>
  <div class="news-search-wrap">
    <input class="news-search" id="newsSearch" placeholder="Search news..." oninput="filterSearch(this.value)">
  </div>
  <div class="news-feed" id="newsFeed">
    <div class="empty-feed"><span style="color:var(--text3)">Select an asset</span></div>
  </div>
</aside>
</div>

<!-- AUTH MODAL -->
<div class="modal-overlay hidden" id="authModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">SIGNAL / account</span>
      <button class="modal-close" onclick="closeAuth()">×</button>
    </div>
    <div class="modal-body">
      <div class="modal-tabs">
        <button class="mtab active" onclick="switchAuthTab('login',this)">Sign in</button>
        <button class="mtab" onclick="switchAuthTab('signup',this)">Sign up</button>
      </div>
      <div id="authForm">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" id="authEmail" type="email" placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-input" id="authPassword" type="password" placeholder="••••••••">
        </div>
        <button class="form-btn" id="authSubmit" onclick="submitAuth()">Sign in</button>
        <div class="form-msg" id="authMsg"></div>

      </div>
    </div>
  </div>
</div>

  JPM:['jpmorgan','jpm','jamie dimon'],
  GS:['goldman sachs','goldman','investment bank'],
  SPY:['s&p 500','spy','stock market','index'],
  ASML:['asml','semiconductor','lithography','euv'],
  SAP:['sap','enterprise software','erp'],
  LVMHF:['lvmh','louis vuitton','luxury','bernard arnault'],
  SIEGY:['siemens','industrial','automation'],
  NSRGY:['nestle','nestlé','consumer goods'],
};

const FH_NEWS = {
  USOIL:{cat:'general'},BRENT:{cat:'general'},GOLD:{cat:'general'},SILVER:{cat:'general'},
  PLATINUM:{cat:'general'},COPPER:{cat:'general'},NATGAS:{cat:'general'},
  BTCUSD:{cat:'crypto'},ETHUSD:{cat:'crypto'},SOLUSD:{cat:'crypto'},
  XRPUSD:{cat:'crypto'},ADAUSD:{cat:'crypto'},AVAXUSD:{cat:'crypto'},LINKUSD:{cat:'crypto'},
  AAPL:{sym:'AAPL'},MSFT:{sym:'MSFT'},NVDA:{sym:'NVDA'},TSLA:{sym:'TSLA'},
  META:{sym:'META'},GOOGL:{sym:'GOOGL'},AMZN:{sym:'AMZN'},JPM:{sym:'JPM'},
  GS:{sym:'GS'},SPY:{sym:'SPY'},ASML:{sym:'ASML'},SAP:{sym:'SAP'},
  LVMHF:{sym:'LVMHF'},SIEGY:{sym:'SIEGY'},NSRGY:{sym:'NSRGY'},
};

// ── STATE ──
let current = null;
let allNews = [];
let prices = {};
let watchlist = [];
let user = null;
let activeTab = 'all';
let authMode = 'login';
const API = '';

// ── BOOT ──
document.addEventListener('DOMContentLoaded', async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) await onSignIn(session.user, false);
  sb.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_IN' && session) onSignIn(session.user, true);
    if (event === 'SIGNED_OUT') onSignOut();
  });
  renderSidebar();
  loadPrices();
  setInterval(loadPrices, 15000);
  // Select first asset
  const firstSym = Object.keys(ASSET_MAP)[0];
  selectBySym(firstSym);
});

// ── AUTH ──
async function onSignIn(u, fresh) {
  user = u;
  document.getElementById('userLabel').textContent = u.email.split('@')[0];
  document.getElementById('userLabel').style.display = 'block';
  const btn = document.getElementById('authBtn');
  btn.textContent = 'Sign out';
  btn.classList.add('signed-in');
  btn.onclick = signOut;
  await loadWatchlist();
  renderSidebar();
  if (fresh) closeAuth();
}

function onSignOut() {
  user = null;
  watchlist = [];
  document.getElementById('userLabel').style.display = 'none';
  const btn = document.getElementById('authBtn');
  btn.textContent = 'Sign in';
  btn.classList.remove('signed-in');
  btn.onclick = openAuth;
  if (activeTab === 'watchlist') switchTab('all', document.querySelector('.stab'));
  renderSidebar();
}

async function loadWatchlist() {
  if (!user) return;
  const { data } = await sb.from('watchlists').select('symbols').eq('user_id', user.id).single();
  watchlist = data?.symbols || [];
}

async function saveWatchlist() {
  if (!user) return;
  await sb.from('watchlists').upsert({ user_id: user.id, symbols: watchlist, updated_at: new Date().toISOString() });
}

async function toggleWatch(sym, e) {
  e.stopPropagation();
  if (!user) { openAuth(); return; }
  if (watchlist.includes(sym)) {
    watchlist = watchlist.filter(s => s !== sym);
  } else {
    watchlist = [...watchlist, sym];
  }
  await saveWatchlist();
  renderSidebar();
  if (current?.sym === sym) {} // keep selection
}

function openAuth() { document.getElementById('authModal').classList.remove('hidden'); }
function closeAuth() { document.getElementById('authModal').classList.add('hidden'); document.getElementById('authMsg').textContent = ''; }

function switchAuthTab(mode, btn) {
  authMode = mode;
  document.querySelectorAll('.mtab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('authSubmit').textContent = mode === 'login' ? 'Sign in' : 'Create account';
  document.getElementById('authMsg').textContent = '';
}

async function submitAuth() {
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  const btn = document.getElementById('authSubmit');
  const msg = document.getElementById('authMsg');
  if (!email || !password) { msg.textContent = 'Fill in all fields.'; msg.className = 'form-msg err'; return; }
  btn.disabled = true;
  btn.textContent = '...';
  let error;
  if (authMode === 'login') {
    const r = await sb.auth.signInWithPassword({ email, password });
    error = r.error;
  } else {
    const r = await sb.auth.signUp({ email, password });
    error = r.error;
    if (!error) {
      msg.textContent = '✓ Account created — check your email to confirm.';
      msg.className = 'form-msg ok';
      btn.disabled = false;
      btn.textContent = 'Create account';
      document.getElementById('authEmail').value = '';
      document.getElementById('authPassword').value = '';
      return;
    }
  }
  btn.disabled = false;
  btn.textContent = authMode === 'login' ? 'Sign in' : 'Create account';
  if (error) { msg.textContent = error.message; msg.className = 'form-msg err'; }
}



async function signOut() {
  await sb.auth.signOut();
}

// ── SIDEBAR ──
function switchTab(tab, btn) {
  activeTab = tab;
  document.querySelectorAll('.stab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderSidebar();
}

function renderSidebar() {
  const body = document.getElementById('sidebarBody');
  if (activeTab === 'watchlist') {
    if (!user) {
      body.innerHTML = `<div class="watchlist-empty"><span>Sign in to save your watchlist</span><button onclick="openAuth()">Sign in</button></div>`;
      return;
    }
    if (watchlist.length === 0) {
      body.innerHTML = `<div class="watchlist-empty"><span>Your watchlist is empty.<br>Click ★ next to any asset to add it.</span></div>`;
      return;
    }
    const syms = watchlist;
    let html = '<div class="asset-group">';
    syms.forEach(sym => {
      const a = ASSET_MAP[sym];
      if (!a) return;
      html += renderRow(a);
    });
    html += '</div>';
    body.innerHTML = html;
  } else {
    let html = '';
    ALL_ASSETS.forEach((g, gi) => {
      if (gi > 0) html += '<div class="sidebar-divider"></div>';
      html += `<div class="asset-group"><div class="group-label">${g.group}</div>`;
      g.assets.forEach(a => { html += renderRow({ ...a, type: g.type }); });
      html += '</div>';
    });
    body.innerHTML = html;
  }
  // re-apply active state
  if (current) {
    const el = body.querySelector(`[data-sym="${current.sym}"]`);
    if (el) el.classList.add('active');
  }
  // re-apply prices
  Object.keys(prices).forEach(sym => updateSidebarRow(sym, prices[sym]));
}

function renderRow(a) {
  const isWatched = watchlist.includes(a.sym);
  const watchIcon = isWatched ? '★' : '☆';
  return `<div class="asset-row" data-sym="${a.sym}" data-type="${a.type}" onclick="selectBySym('${a.sym}')">
    <div class="ar-left"><span class="ar-sym">${a.label}</span><span class="ar-name">${a.name}</span></div>
    <div style="display:flex;align-items:center;gap:6px;">
      <div class="ar-right"><div class="ar-price" id="p-${a.sym}">—</div><div class="ar-chg flat" id="c-${a.sym}">—</div></div>
      <button class="watch-toggle ${isWatched?'watched':''}" onclick="toggleWatch('${a.sym}',event)" title="${isWatched?'Remove from watchlist':'Add to watchlist'}">${watchIcon}</button>
    </div>
  </div>`;
}

// ── SELECT ASSET ──
function selectBySym(sym) {
  const a = ASSET_MAP[sym];
  if (!a) return;
  current = a;
  renderSidebar();
  updateHeader();
  loadChart();
  loadNews();
}

function updateHeader() {
  if (!current) return;
  document.getElementById('hSym').textContent = current.label;
  document.getElementById('hName').textContent = current.name + ' · ' + current.type.replace('eu-equity','EU Equity').replace('equity','Equity').replace('commodity','Commodity').replace('crypto','Crypto');
  document.getElementById('hType').textContent = current.type.replace('eu-equity','EU EQUITY').replace('equity','EQUITY').replace('commodity','COMMODITY').replace('crypto','CRYPTO').toUpperCase();
  document.getElementById('npTitle').textContent = current.label + ' · News';
  const p = prices[current.sym];
  if (p) renderHeaderPrice(p);
}

function renderHeaderPrice(p) {
  document.getElementById('hPrice').textContent = fmt(p.c, current.type);
  const up = p.dp >= 0;
  const el = document.getElementById('hChg');
  el.textContent = (up?'+':'') + (p.dp||0).toFixed(2) + '%  ' + (up?'▲':'▼') + ' ' + fmt(Math.abs(p.d||0), current.type);
  el.className = 'ch-chg ' + (up?'up':'dn');
}

function loadChart() {
  if (!current) return;
  const sym = encodeURIComponent(current.tv);
  document.getElementById('tvChart').src = `https://s.tradingview.com/widgetembed/?symbol=${sym}&interval=D&hidesidetoolbar=0&saveimage=0&toolbarbg=111113&theme=dark&style=1&locale=en&withdateranges=1&allow_symbol_change=0&studies=RSI%40tv-basicstudies%1FMACD%40tv-basicstudies`;
}

// ── PRICES ──
async function loadPrices() {
  const allSyms = Object.values(ASSET_MAP);
  await Promise.allSettled(allSyms.map(async a => {
    try {
      const r = await fetch(`${API}/api/quote?symbol=${encodeURIComponent(a.fh)}`);
      const d = await r.json();
      if (d.c && d.c > 0) { prices[a.sym] = d; updateSidebarRow(a.sym, d); }
    } catch(e) {}
  }));
  updateTickerBar();
  if (current) updateHeader();
}

function fmt(v, type) {
  if (!v || v === 0) return '—';
  if (type === 'crypto' && v >= 1000) return '$' + v.toLocaleString('en-US', {maximumFractionDigits:0});
  if (type === 'crypto') return '$' + v.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:4});
  return '$' + v.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function updateSidebarRow(sym, d) {
  const pEl = document.getElementById('p-' + sym);
  const cEl = document.getElementById('c-' + sym);
  if (!pEl || !cEl) return;
  const type = ASSET_MAP[sym]?.type || 'equity';
  const up = d.dp >= 0;
  pEl.textContent = fmt(d.c, type);
  cEl.textContent = (up?'+':'') + (d.dp||0).toFixed(2) + '%';
  cEl.className = 'ar-chg ' + (up?'up':'dn');
}

function updateTickerBar() {
  const items = ['USOIL','GOLD','BTCUSD','ETHUSD','SOLUSD','AAPL','NVDA','TSLA','META','MSFT','GOOGL','SPY'];
  let html = '';
  for (const sym of items) {
    const d = prices[sym]; const a = ASSET_MAP[sym];
    if (!d || !a) continue;
    const up = d.dp >= 0;
    html += `<div class="t-item" onclick="selectBySym('${sym}')"><span class="t-sym">${a.label}</span><span class="t-val">${fmt(d.c,a.type)}</span><span class="t-chg ${up?'up':'dn'}">${up?'+':''}${(d.dp||0).toFixed(2)}%</span></div>`;
  }
  const track = document.getElementById('tickerTrack');
  track.innerHTML = html + html;
}

// ── NEWS ──
async function loadNews() {
  if (!current) return;
  const feed = document.getElementById('newsFeed');
  feed.innerHTML = '<div class="empty-feed"><div class="dots"><span></span><span></span><span></span></div><span>Loading...</span></div>';
  document.getElementById('npCount').textContent = '—';
  document.getElementById('newsSearch').value = '';

  const info = FH_NEWS[current.sym];
  if (!info) return;

  try {
    let articles = [];
    if (info.sym) {
      const r = await fetch(`${API}/api/news?symbol=${info.sym}`);
      articles = await r.json();
    } else {
      const r = await fetch(`${API}/api/market-news?category=${info.cat}`);
      const raw = await r.json();
      const kws = KEYWORDS[current.sym] || [];
      articles = raw.filter(a => {
        const t = ((a.headline||'') + ' ' + (a.summary||'')).toLowerCase();
        return kws.some(k => t.includes(k));
      });
      if (articles.length < 5) {
        const extras = raw.filter(a => !articles.includes(a)).slice(0, 10);
        articles = [...articles, ...extras];
      }
    }
    allNews = articles;
    renderNews(articles);
    // AI analysis disabled — enable when ANTHROPIC_KEY is set
  } catch(e) {
    feed.innerHTML = '<div class="empty-feed" style="color:var(--red)">Failed to load news.</div>';
  }
}

function timeAgo(ts) {
  const m = Math.floor((Date.now() - ts * 1000) / 60000);
  if (m < 1) return 'now';
  if (m < 60) return m + 'm';
  if (m < 1440) return Math.floor(m/60) + 'h';
  return Math.floor(m/1440) + 'd';
}

function renderNews(articles) {
  const feed = document.getElementById('newsFeed');
  document.getElementById('npCount').textContent = articles.length;
  if (!articles.length) { feed.innerHTML = '<div class="empty-feed">No news found.</div>'; return; }
  feed.innerHTML = articles.map(a => `
    <div class="news-item" onclick="window.open('${(a.url||'#').replace(/'/g,"\\'")}','_blank')">
      <div class="ni-meta"><span class="ni-source">${a.source||'Unknown'}</span><span class="ni-age">${timeAgo(a.datetime||0)}</span></div>
      <div class="ni-headline">${a.headline||''}</div>
      ${a.summary?`<div class="ni-summary">${a.summary.slice(0,160)}…</div>`:''}
    </div>`).join('');
}

function filterSearch(q) {
  if (!q.trim()) { renderNews(allNews); return; }
  const ql = q.toLowerCase();
  renderNews(allNews.filter(a => ((a.headline||'')+' '+(a.summary||'')).toLowerCase().includes(ql)));
}

// ── AI MACRO ANALYSIS ──
async function runAnalysis(articles) {
  const p = prices[current.sym];
  try {
    const r = await fetch(`${API}/api/analyze`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        assetName: current.name,
        assetType: current.type,
        price: p ? fmt(p.c, current.type) : null,
        changePercent: p?.dp || null,
        headlines: articles.slice(0, 14).map(a => a.headline||'').filter(Boolean),
      }),
    });
    const data = await r.json();
    if (data.analysis) {
      document.getElementById('aiBody').textContent = data.analysis;
      const sent = (data.sentiment||'NEUTRAL').toUpperCase();
      document.getElementById('aiBadge').textContent = sent;
      document.getElementById('aiBadge').className = 'ai-badge ' + sent.toLowerCase();
      if (data.catalyst) {
        const cat = document.getElementById('aiCatalyst');
        cat.textContent = data.catalyst.toUpperCase();
        cat.style.display = 'block';
      }
    } else {
      throw new Error('no analysis');
    }
  } catch(e) {
    document.getElementById('aiBody').innerHTML = '<span style="color:var(--text3)">Analysis unavailable.</span>';
    document.getElementById('aiBadge').textContent = '—';
  }
}
</script>
