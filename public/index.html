<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SIGNAL">
<meta name="theme-color" content="#0d0d0d">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.svg">
<title>SIGNAL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0d0d0d;--surface:#111113;--surface2:#161618;--surface3:#1c1c1f;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#f0f0f2;--text2:#a0a0b0;--text3:#606070;
  --green:#3ecf8e;--red:#f87171;--amber:#f59e0b;--blue:#60a5fa;--purple:#a78bfa;
  --mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif;--r:8px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --nav-h:56px;--top-h:48px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;overflow:hidden;-webkit-font-smoothing:antialiased;overscroll-behavior:none;}

/* ── TOPBAR ── */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:50;
  height:calc(var(--top-h) + var(--safe-top));
  padding-top:var(--safe-top);
  display:flex;align-items:center;
  background:var(--surface);border-bottom:1px solid var(--border);
  padding-left:14px;padding-right:14px;gap:10px;
}
.logo{font-family:var(--mono);font-size:13px;font-weight:600;letter-spacing:.1em;color:var(--text);}
.logo em{color:var(--text3);font-style:normal;font-weight:400;}
.top-ticker{flex:1;overflow:hidden;mask-image:linear-gradient(to right,transparent,black 20px,black calc(100% - 20px),transparent);}
.ticker-track{display:flex;white-space:nowrap;animation:ticker 60s linear infinite;}
.ticker-track:hover{animation-play-state:paused;}
@keyframes ticker{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}
.t-item{display:inline-flex;align-items:center;gap:5px;padding:0 10px;cursor:pointer;}
.t-sym{font-family:var(--mono);font-size:10px;font-weight:500;color:var(--text3);}
.t-val{font-family:var(--mono);font-size:10px;color:var(--text);}
.t-chg{font-family:var(--mono);font-size:10px;}
.t-chg.up{color:var(--green);}.t-chg.dn{color:var(--red);}
.top-auth{flex-shrink:0;}
.auth-btn{font-family:var(--mono);font-size:10px;padding:5px 10px;border-radius:4px;border:1px solid var(--border2);background:none;color:var(--text2);cursor:pointer;white-space:nowrap;}
.auth-btn.signed-in{color:var(--green);border-color:rgba(62,207,142,.3);}

/* ── BOTTOM NAV ── */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:50;
  height:calc(var(--nav-h) + var(--safe-bottom));
  padding-bottom:var(--safe-bottom);
  display:flex;align-items:stretch;
  background:var(--surface);border-top:1px solid var(--border);
}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;cursor:pointer;color:var(--text3);transition:color .15s;padding:0;}
.nav-btn.active{color:var(--text);}
.nav-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
.nav-label{font-size:9px;font-family:var(--mono);letter-spacing:.04em;text-transform:uppercase;}
.nav-dot{width:4px;height:4px;border-radius:50%;background:var(--green);position:absolute;top:8px;}

/* ── PAGE SYSTEM ── */
.page{
  position:fixed;inset:0;
  top:calc(var(--top-h) + var(--safe-top));
  bottom:calc(var(--nav-h) + var(--safe-bottom));
  overflow-y:auto;overflow-x:hidden;
  display:none;
  -webkit-overflow-scrolling:touch;
}
.page.active{display:block;}
.page::-webkit-scrollbar{width:0;}

/* ── MARKETS PAGE ── */
.asset-group{padding:10px 0 4px;}
.group-label{font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);padding:0 14px 6px;}
.asset-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;transition:background .1s;border-left:2px solid transparent;gap:8px;-webkit-tap-highlight-color:transparent;}
.asset-row:active{background:var(--surface2);}
.asset-row.active{background:var(--surface3);border-left-color:var(--text);}
.ar-left{display:flex;align-items:center;gap:10px;}
.ar-icon{width:32px;height:32px;border-radius:8px;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;font-weight:600;flex-shrink:0;}
.ar-icon.commodity{color:var(--amber);}
.ar-icon.crypto{color:var(--blue);}
.ar-icon.equity{color:var(--text2);}
.ar-icon.eu-equity{color:var(--purple);}
.ar-info{display:flex;flex-direction:column;gap:1px;}
.ar-sym{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--text);}
.ar-name{font-size:11px;color:var(--text3);}
.ar-right{display:flex;align-items:center;gap:8px;}
.ar-prices{text-align:right;}
.ar-price{font-family:var(--mono);font-size:12px;color:var(--text);}
.ar-chg{font-family:var(--mono);font-size:10px;}
.ar-chg.up{color:var(--green);}.ar-chg.dn{color:var(--red);}.ar-chg.flat{color:var(--text3);}
.watch-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:none;color:var(--text3);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-tap-highlight-color:transparent;}
.watch-btn.on{color:var(--amber);border-color:rgba(245,158,11,.3);background:rgba(245,158,11,.08);}
.divider{height:1px;background:var(--border);margin:2px 0;}

/* ── DETAIL PAGE ── */
.detail-header{padding:14px;border-bottom:1px solid var(--border);background:var(--surface);}
.detail-back{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;color:var(--text3);cursor:pointer;margin-bottom:10px;-webkit-tap-highlight-color:transparent;}
.detail-back svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;}
.detail-title{display:flex;align-items:flex-end;justify-content:space-between;}
.detail-sym{font-family:var(--mono);font-size:22px;font-weight:600;color:var(--text);}
.detail-name{font-size:11px;color:var(--text3);margin-top:2px;}
.detail-price{font-family:var(--mono);font-size:22px;color:var(--text);}
.detail-chg{font-family:var(--mono);font-size:12px;margin-top:2px;text-align:right;}
.detail-chg.up{color:var(--green);}.detail-chg.dn{color:var(--red);}
.detail-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface);}
.dtab{flex:1;padding:10px 0;font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.dtab.active{color:var(--text);border-bottom-color:var(--text);}
.detail-content{display:none;}
.detail-content.active{display:block;}

/* CHART TAB */
.chart-wrap{height:55vw;min-height:240px;max-height:360px;background:var(--bg);}
.chart-wrap iframe{width:100%;height:100%;border:none;display:block;}

/* NEWS TAB */
.news-item{padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;-webkit-tap-highlight-color:transparent;}
.news-item:active{background:var(--surface2);}
.ni-meta{display:flex;justify-content:space-between;margin-bottom:4px;}
.ni-src{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;font-weight:500;}
.ni-age{font-family:var(--mono);font-size:10px;color:var(--text3);}
.ni-hl{font-size:13px;line-height:1.5;color:var(--text);}
.ni-sum{font-size:11px;color:var(--text2);line-height:1.55;margin-top:5px;}

/* COMMUNITY TAB */
.comm-composer{padding:12px 14px;border-bottom:1px solid var(--border);background:var(--surface);}
.comm-textarea{width:100%;background:var(--surface3);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;color:var(--text);font-family:var(--sans);font-size:13px;outline:none;resize:none;min-height:70px;line-height:1.5;transition:border-color .15s;}
.comm-textarea:focus{border-color:var(--border2);}
.comm-textarea::placeholder{color:var(--text3);}
.comm-footer{display:flex;align-items:center;justify-content:space-between;margin-top:8px;}
.comm-chars{font-family:var(--mono);font-size:10px;color:var(--text3);}
.comm-post-btn{font-family:var(--mono);font-size:11px;font-weight:500;padding:7px 16px;background:var(--text);color:var(--bg);border:none;border-radius:5px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.comm-post-btn:disabled{opacity:.4;}
.comm-login-prompt{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.comm-login-txt{font-size:12px;color:var(--text3);}
.comm-login-btn{font-family:var(--mono);font-size:10px;padding:5px 12px;border:1px solid var(--border2);background:none;color:var(--text2);border-radius:4px;cursor:pointer;}
.post-card{padding:12px 14px;border-bottom:1px solid var(--border);}
.post-card:active{background:var(--surface2);}
.post-meta{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.post-avatar{width:24px;height:24px;border-radius:50%;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;font-weight:600;color:var(--text2);flex-shrink:0;}
.post-user{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--text2);}
.post-time{font-family:var(--mono);font-size:10px;color:var(--text3);margin-left:auto;}
.post-body{font-size:13px;line-height:1.55;color:var(--text);margin-bottom:8px;}
.post-actions{display:flex;align-items:center;gap:12px;}
.post-upvote{display:flex;align-items:center;gap:4px;font-family:var(--mono);font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer;padding:0;-webkit-tap-highlight-color:transparent;}
.post-upvote.voted{color:var(--green);}
.post-reply-btn{font-family:var(--mono);font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer;padding:0;-webkit-tap-highlight-color:transparent;}
.replies-section{margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}
.reply-card{padding:8px 0 4px;display:flex;gap:8px;}
.reply-line{width:2px;background:var(--border);flex-shrink:0;margin-left:11px;}
.reply-content{flex:1;}
.reply-meta{display:flex;align-items:center;gap:6px;margin-bottom:3px;}
.reply-user{font-family:var(--mono);font-size:10px;color:var(--text3);}
.reply-time{font-family:var(--mono);font-size:10px;color:var(--text3);opacity:.6;}
.reply-body{font-size:12px;line-height:1.5;color:var(--text2);}
.reply-composer{margin-top:8px;display:flex;gap:8px;}
.reply-input{flex:1;background:var(--surface3);border:1px solid var(--border);border-radius:5px;padding:7px 10px;color:var(--text);font-family:var(--sans);font-size:12px;outline:none;}
.reply-input::placeholder{color:var(--text3);}
.reply-submit{font-family:var(--mono);font-size:10px;padding:7px 12px;background:var(--surface3);border:1px solid var(--border2);color:var(--text2);border-radius:5px;cursor:pointer;flex-shrink:0;}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;gap:8px;color:var(--text3);font-size:12px;text-align:center;}

/* WATCHLIST PAGE */
.watchlist-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:10px;color:var(--text3);font-size:13px;text-align:center;padding:20px;}
.watchlist-empty .wl-icon{font-size:32px;margin-bottom:4px;}

/* DOTS LOADER */
.dots{display:inline-flex;gap:3px;}
.dots span{width:3px;height:3px;border-radius:50%;background:var(--text3);animation:dp 1.2s infinite;}
.dots span:nth-child(2){animation-delay:.2s;}.dots span:nth-child(3){animation-delay:.4s;}
@keyframes dp{0%,80%,100%{opacity:.2;}40%{opacity:1;}}

/* AUTH MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:flex-end;justify-content:center;z-index:100;backdrop-filter:blur(4px);}
.modal-overlay.hidden{display:none;}
.modal{background:var(--surface);border-radius:16px 16px 0 0;width:100%;max-width:480px;padding-bottom:calc(20px + var(--safe-bottom));border-top:1px solid var(--border2);}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 16px;}
.modal-title{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--text);padding:0 20px 16px;border-bottom:1px solid var(--border);}
.modal-body{padding:20px;}
.modal-tabs{display:flex;gap:0;margin-bottom:20px;border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.mtab{flex:1;padding:8px;font-family:var(--mono);font-size:11px;background:none;border:none;color:var(--text3);cursor:pointer;}
.mtab.active{background:var(--surface3);color:var(--text);}
.form-group{margin-bottom:14px;}
.form-label{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px;display:block;}
.form-input{width:100%;background:var(--surface3);border:1px solid var(--border);border-radius:5px;padding:10px 12px;color:var(--text);font-family:var(--sans);font-size:14px;outline:none;}
.form-input:focus{border-color:var(--border2);}
.form-input::placeholder{color:var(--text3);}
.form-btn{width:100%;padding:12px;background:var(--text);color:var(--bg);border:none;border-radius:6px;font-family:var(--mono);font-size:12px;font-weight:600;cursor:pointer;margin-top:4px;}
.form-btn:disabled{opacity:.4;}
.form-msg{font-size:11px;margin-top:10px;text-align:center;}
.form-msg.err{color:var(--red);}.form-msg.ok{color:var(--green);}

/* INSTALL BANNER */
.install-banner{position:fixed;bottom:calc(var(--nav-h) + var(--safe-bottom) + 8px);left:12px;right:12px;z-index:40;background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:10px;}
.install-banner.hidden{display:none;}
.install-icon{width:36px;height:36px;border-radius:8px;background:var(--surface3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:14px;font-weight:700;color:var(--text);}
.install-text{flex:1;}
.install-title{font-size:12px;font-weight:500;color:var(--text);}
.install-sub{font-size:11px;color:var(--text3);margin-top:1px;}
.install-actions{display:flex;gap:6px;flex-shrink:0;}
.install-dismiss{font-family:var(--mono);font-size:10px;background:none;border:none;color:var(--text3);cursor:pointer;padding:4px;}
.install-btn{font-family:var(--mono);font-size:10px;padding:6px 12px;background:var(--text);color:var(--bg);border:none;border-radius:5px;cursor:pointer;font-weight:600;}

/* DESKTOP LAYOUT */
@media (min-width: 768px) {
  .bottom-nav{display:none;}
  .page{bottom:0;}
  .topbar{gap:16px;}

  /* Desktop: sidebar + main */
  #page-markets{
    display:block!important;
    position:fixed;
    top:calc(var(--top-h) + var(--safe-top));
    left:0;width:220px;bottom:0;
    border-right:1px solid var(--border);
    background:var(--surface);
  }
  #page-detail{
    display:block!important;
    position:fixed;
    top:calc(var(--top-h) + var(--safe-top));
    left:220px;right:320px;bottom:0;
    background:var(--bg);
    border-right:1px solid var(--border);
  }
  #page-watchlist{display:none!important;}
  #page-news-desktop{
    display:block!important;
    position:fixed;
    top:calc(var(--top-h) + var(--safe-top));
    right:0;width:320px;bottom:0;
    background:var(--surface);
  }
  .detail-back{display:none;}
  .detail-tabs .dtab[data-tab="news"]{display:none;}
  .install-banner{bottom:12px;}
  .modal-overlay{align-items:center;}
  .modal{border-radius:12px;max-width:400px;padding-bottom:0;}
  .modal-handle{display:none;}
}
</style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <div class="logo">SIG<em>NAL</em></div>
  <div class="top-ticker"><div class="ticker-track" id="tickerTrack"></div></div>
  <div class="top-auth">
    <button class="auth-btn" id="authBtn" onclick="openAuth()">Sign in</button>
  </div>
</header>

<!-- PAGES -->

<!-- MARKETS -->
<div class="page active" id="page-markets">
  <div id="marketsBody"></div>
</div>

<!-- DETAIL (mobile: full page / desktop: center panel) -->
<div class="page" id="page-detail">
  <div class="detail-header">
    <div class="detail-back" onclick="goBack()">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Markets
    </div>
    <div class="detail-title">
      <div>
        <div class="detail-sym" id="dSym">—</div>
        <div class="detail-name" id="dName">—</div>
      </div>
      <div>
        <div class="detail-price" id="dPrice">—</div>
        <div class="detail-chg" id="dChg">—</div>
      </div>
    </div>
  </div>
  <div class="detail-tabs">
    <button class="dtab active" data-tab="chart" onclick="switchDetailTab('chart',this)">Chart</button>
    <button class="dtab" data-tab="news" onclick="switchDetailTab('news',this)">News</button>
    <button class="dtab" data-tab="community" onclick="switchDetailTab('community',this)">Community</button>
  </div>
  <div class="detail-content active" id="tab-chart">
    <div class="chart-wrap"><iframe id="tvChart" src="" title="Chart" allowtransparency="true"></iframe></div>
    <!-- AI Card -->
    <div style="margin:12px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface2);opacity:.45;pointer-events:none;">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--border);">
        <span style="font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:.06em;">MACRO CONTEXT</span>
        <span style="font-family:var(--mono);font-size:10px;color:var(--text3);background:var(--surface3);padding:1px 7px;border-radius:3px;">COMING SOON</span>
      </div>
      <div style="padding:10px 12px;font-size:11.5px;color:var(--text3);">AI macro analysis — available in a future update.</div>
    </div>
  </div>
  <div class="detail-content" id="tab-news">
    <div id="newsFeed"><div class="empty-state"><div class="dots"><span></span><span></span><span></span></div></div></div>
  </div>
  <div class="detail-content" id="tab-community">
    <div id="communityFeed"></div>
  </div>
</div>

<!-- WATCHLIST -->
<div class="page" id="page-watchlist">
  <div id="watchlistBody"></div>
</div>

<!-- DESKTOP NEWS PANEL -->
<div class="page" id="page-news-desktop" style="display:none;">
  <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);">
    <span style="font-family:var(--mono);font-size:11px;color:var(--text2);" id="desktopNewsTitle">News</span>
    <span style="font-family:var(--mono);font-size:10px;color:var(--text3);background:var(--surface3);padding:1px 6px;border-radius:3px;" id="desktopNewsCount">—</span>
  </div>
  <div style="padding:8px 12px;border-bottom:1px solid var(--border);">
    <input style="width:100%;background:var(--surface3);border:1px solid var(--border);border-radius:4px;padding:6px 10px;color:var(--text);font-family:var(--sans);font-size:11px;outline:none;" placeholder="Search news..." oninput="filterSearch(this.value)" id="newsSearch">
  </div>
  <div style="overflow-y:auto;height:calc(100% - 88px);" id="desktopNewsFeed">
    <div class="empty-state"><span>Select an asset</span></div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-markets" onclick="showPage('markets')">
    <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    <span class="nav-label">Markets</span>
  </button>
  <button class="nav-btn" id="nav-watchlist" onclick="showPage('watchlist')">
    <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    <span class="nav-label">Watchlist</span>
  </button>
</nav>

<!-- INSTALL BANNER -->
<div class="install-banner hidden" id="installBanner">
  <div class="install-icon">S</div>

async function submitAuth() {
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  const btn = document.getElementById('authSubmit');
  const msg = document.getElementById('authMsg');
  if (!email || !password) { msg.textContent='Fill in all fields.'; msg.className='form-msg err'; return; }
  btn.disabled = true; btn.textContent = '...';
  let error;
  if (authMode === 'login') {
    const r = await sb.auth.signInWithPassword({email, password});
    error = r.error;
  } else {
    const r = await sb.auth.signUp({email, password});
    error = r.error;

      msg.className = 'form-msg ok';
      btn.disabled = false; btn.textContent = 'Create account';
      document.getElementById('authEmail').value = '';
      document.getElementById('authPassword').value = '';
      return;
    }
  }
  btn.disabled = false;
  btn.textContent = authMode==='login' ? 'Sign in' : 'Create account';
  if (error) { msg.textContent = error.message; msg.className = 'form-msg err'; }
}

// ── PRICES ──
async function loadPrices() {
  await Promise.allSettled(Object.values(ASSET_MAP).map(async a => {
    try {
      const r = await fetch(`${API}/api/quote?symbol=${encodeURIComponent(a.fh)}`);
      const d = await r.json();
      if (d.c && d.c > 0) {
        prices[a.sym] = d;
        updateRowPrices(a.sym, d);
        if (current?.sym === a.sym) {
          document.getElementById('dPrice').textContent = fmt(d.c, a.type);
          renderDetailChg(d);
        }
      }
    } catch(e) {}
  }));
  updateTicker();
}

function fmt(v, type) {
  if (!v || v === 0) return '—';
  if (type==='crypto' && v>=1000) return '$'+v.toLocaleString('en-US',{maximumFractionDigits:0});
  if (type==='crypto') return '$'+v.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:4});
  return '$'+v.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
}

function updateRowPrices(sym, d) {
  const pEl = document.getElementById('p-' + sym);
  const cEl = document.getElementById('c-' + sym);
  if (!pEl) return;
  const type = ASSET_MAP[sym]?.type || 'equity';
  const up = d.dp >= 0;
  pEl.textContent = fmt(d.c, type);
  if (cEl) { cEl.textContent = (up?'+':'') + (d.dp||0).toFixed(2) + '%'; cEl.className = 'ar-chg ' + (up?'up':'dn'); }
}

function updateTicker() {
  const syms = ['USOIL','GOLD','BTCUSD','ETHUSD','SOLUSD','AAPL','NVDA','TSLA','META','MSFT','GOOGL','SPY'];
  let html = '';
  syms.forEach(sym => {
    const d = prices[sym]; const a = ASSET_MAP[sym];
    if (!d || !a) return;
    const up = d.dp >= 0;
    html += `<span class="t-item" onclick="openDetail('${sym}')"><span class="t-sym">${a.label}</span><span class="t-val">${fmt(d.c,a.type)}</span><span class="t-chg ${up?'up':'dn'}">${up?'+':''}${(d.dp||0).toFixed(2)}%</span></span>`;
  });
  const t = document.getElementById('tickerTrack');
  t.innerHTML = html + html;
}

// ── NEWS ──
async function loadNews(sym) {
  const info = FH_NEWS[sym];
  if (!info) return;
  const setFeed = html => {
    document.getElementById('newsFeed').innerHTML = html;
    document.getElementById('desktopNewsFeed').innerHTML = html;
  };
  const setCount = n => { document.getElementById('desktopNewsCount').textContent = n; };
  setFeed('<div class="empty-state"><div class="dots"><span></span><span></span><span></span></div></div>');
  setCount('—');
  try {
    let articles = [];
    if (info.sym) {
      const r = await fetch(`${API}/api/news?symbol=${info.sym}`);
      articles = await r.json();
    } else {
      const r = await fetch(`${API}/api/market-news?category=${info.cat}`);
      const raw = await r.json();
      const kws = KEYWORDS[sym] || [];
      articles = raw.filter(a => {
        const t = ((a.headline||'')+(a.summary||'')).toLowerCase();
        return kws.some(k => t.includes(k));
      });
      if (articles.length < 5) articles = [...articles, ...raw.filter(a=>!articles.includes(a)).slice(0,10)];
    }
    allNews = articles;
    const html = renderNewsHTML(articles);
    setFeed(html);
    setCount(articles.length);
  } catch(e) {
    setFeed('<div class="empty-state" style="color:var(--red)">Failed to load news.</div>');
  }
}

function renderNewsHTML(articles) {
  if (!articles.length) return '<div class="empty-state">No news found.</div>';
  return articles.map(a => `
    <div class="news-item" onclick="window.open('${(a.url||'#').replace(/'/g,"\\'")}','_blank')">
      <div class="ni-meta"><span class="ni-src">${a.source||'Unknown'}</span><span class="ni-age">${timeAgo(a.datetime||0)}</span></div>
      <div class="ni-hl">${a.headline||''}</div>
      ${a.summary?`<div class="ni-sum">${a.summary.slice(0,140)}…</div>`:''}
    </div>`).join('');
}

function filterSearch(q) {
  if (!q.trim()) { document.getElementById('desktopNewsFeed').innerHTML = renderNewsHTML(allNews); return; }
  const ql = q.toLowerCase();
  const filtered = allNews.filter(a => ((a.headline||'')+(a.summary||'')).toLowerCase().includes(ql));
  document.getElementById('desktopNewsFeed').innerHTML = renderNewsHTML(filtered);
}

function timeAgo(ts) {
  const m = Math.floor((Date.now() - ts*1000)/60000);
  if (m<1) return 'now'; if (m<60) return m+'m';
  if (m<1440) return Math.floor(m/60)+'h'; return Math.floor(m/1440)+'d';
}

    renderPosts(posts, sym);
  } catch(e) {
    document.getElementById('postsContainer').innerHTML = '<div class="empty-state" style="color:var(--red)">Failed to load posts.</div>';
  }
}

function renderPosts(posts, sym) {
  const container = document.getElementById('postsContainer');
  if (!Array.isArray(posts) || posts.length === 0) {
    container.innerHTML = '<div class="empty-state">No posts yet.<br>Be the first to share your thoughts.</div>';
    return;
  }
  container.innerHTML = posts.map(p => renderPost(p, sym)).join('');
}

function renderPost(p, sym) {
  const voted = votedPosts.has(p.id);
  const replyCount = p.community_replies?.[0]?.count || 0;
  const initials = p.username.slice(0,2).toUpperCase();
  return `<div class="post-card" id="post-${p.id}">
    <div class="post-meta">
      <div class="post-avatar">${initials}</div>
      <span class="post-user">${p.username}</span>
      <span class="post-time">${timeAgo(new Date(p.created_at).getTime()/1000)}</span>
    </div>
    <div class="post-body">${escHtml(p.content)}</div>
    <div class="post-actions">
      <button class="post-upvote ${voted?'voted':''}" onclick="upvote('${p.id}','${sym}')">
        ▲ <span id="votes-${p.id}">${p.upvotes||0}</span>
      </button>
      <button class="post-reply-btn" onclick="toggleReplies('${p.id}','${sym}')">
        💬 ${replyCount} ${replyCount===1?'reply':'replies'}
      </button>
    </div>
    <div class="replies-section" id="replies-${p.id}" style="display:none;"></div>
  </div>`;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function updateCommChars(el) {
  document.getElementById('commChars').textContent = 500 - el.value.length;
}

async function submitPost(sym) {
  if (!user) { openAuth(); return; }
  const input = document.getElementById('commInput');
  const content = input.value.trim();
  if (!content) return;
  const username = user.email.split('@')[0];
  try {
    await fetch(`${API}/api/community?action=post`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({sym, content, username}),
    });
    input.value = '';
    document.getElementById('commChars').textContent = '500';
    loadCommunity(sym);
  } catch(e) {}
}

async function upvote(postId, sym) {
  if (votedPosts.has(postId)) return;
  votedPosts.add(postId);
  localStorage.setItem('signal_votes', JSON.stringify([...votedPosts]));
  const el = document.getElementById('votes-' + postId);
  if (el) el.textContent = parseInt(el.textContent) + 1;
  document.querySelector(`button.post-upvote[onclick*="${postId}"]`)?.classList.add('voted');
  try {
    await fetch(`${API}/api/community?action=upvote`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({post_id: postId}),
    });
  } catch(e) {}
}

async function toggleReplies(postId, sym) {
  const section = document.getElementById('replies-' + postId);
  if (section.style.display !== 'none') { section.style.display = 'none'; return; }
  section.style.display = 'block';
  section.innerHTML = '<div class="empty-state" style="padding:8px 0;"><div class="dots"><span></span><span></span><span></span></div></div>';
  try {
    const r = await fetch(`${API}/api/community?action=replies&post_id=${postId}`);
    const replies = await r.json();
    const loginReply = user
      ? `<div class="reply-composer">
          <input class="reply-input" id="reply-input-${postId}" placeholder="Reply..." maxlength="300">
          <button class="reply-submit" onclick="submitReply('${postId}','${sym}')">Send</button>
         </div>`
      : '';
    const repliesHtml = Array.isArray(replies) && replies.length > 0
      ? replies.map(rep => `
          <div class="reply-card">
            <div class="reply-line"></div>
            <div class="reply-content">
              <div class="reply-meta">
                <span class="reply-user">${rep.username}</span>
                <span class="reply-time">${timeAgo(new Date(rep.created_at).getTime()/1000)}</span>
              </div>
              <div class="reply-body">${escHtml(rep.content)}</div>
            </div>
          </div>`).join('')
      : '<div style="padding:8px 0;font-size:12px;color:var(--text3);">No replies yet.</div>';
    section.innerHTML = repliesHtml + loginReply;
  } catch(e) {
    section.innerHTML = '<div style="color:var(--red);font-size:11px;padding:8px 0;">Failed to load replies.</div>';
  }
}

async function submitReply(postId, sym) {
  if (!user) return;
  const input = document.getElementById('reply-input-' + postId);
  const content = input.value.trim();
  if (!content) return;
  const username = user.email.split('@')[0];
  try {
    await fetch(`${API}/api/community?action=reply`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({post_id: postId, content, username}),
    });
    input.value = '';
    toggleReplies(postId, sym);
    setTimeout(() => toggleReplies(postId, sym), 100);
  } catch(e) {}
}
</script>
</body>
</html>
